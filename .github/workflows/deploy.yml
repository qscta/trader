name: deploy

# 生产部署管道（人工审批门）：
#   手动触发（workflow_dispatch）→ preflight 在 CI 环境跑全量 stdlib 测试并
#   钉死待部署 SHA → deploy 任务进入 production 环境等待人工批准 →
#   批准后经 SSH 把 deploy/deploy.sh 送到服务器执行（脚本版本与所部署
#   SHA 严格一致）：临时 worktree 内先跑测试，全绿才切换生产代码并重启，
#   健康检查失败自动回退上一 SHA。
#
# 一次性配置（Secrets / Variables / production 环境审批人）见 deploy/README.md。

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 要部署的分支 / tag / SHA
        required: true
        default: main

# 同一时间只允许一次部署在途；不取消在途部署（避免半截部署被掐断）。
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    # 审批人看到的是「CI 已全绿的确切 SHA」，且后续部署钉死这个 SHA——
    # 即使分支在审批等待期间又有新提交，部署内容也不会漂移。
    name: preflight (pin SHA + stdlib tests)
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.pin.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
      - id: pin
        name: Pin exact SHA
        run: |
          sha=$(git rev-parse HEAD)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "待部署 SHA: $sha"
      - uses: actions/setup-python@v6
        with:
          # 与生产服务器及 requirements.lock 的解析环境保持一致。
          python-version: "3.12"
      - name: Run stdlib-only test suite
        working-directory: trading
        run: python3 -m unittest discover -s . -p "test_*.py"

  deploy:
    name: deploy to production (需人工批准)
    needs: preflight
    runs-on: ubuntu-latest
    # production 环境配置了 Required reviewers：任务在此暂停，等你批准。
    environment: production
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.preflight.outputs.sha }}
      - name: Check configuration
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
          DEPLOY_SERVICES: ${{ vars.DEPLOY_SERVICES }}
        run: |
          missing=""
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_KNOWN_HOSTS; do
            [ -n "$(eval echo "\$$name")" ] || missing="$missing $name(secret)"
          done
          for name in DEPLOY_APP_DIR DEPLOY_SERVICES; do
            [ -n "$(eval echo "\$$name")" ] || missing="$missing $name(variable)"
          done
          if [ -n "$missing" ]; then
            echo "缺少必需配置:$missing —— 见 deploy/README.md" >&2
            exit 1
          fi
      - name: Set up SSH (pinned host key)
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # 主机公钥来自 Secrets（部署前 ssh-keyscan 采集并人工核对指纹），
          # 严格校验——绝不 StrictHostKeyChecking=no。
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
      - name: Deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
          DEPLOY_SERVICES: ${{ vars.DEPLOY_SERVICES }}
          DEPLOY_VENV: ${{ vars.DEPLOY_VENV }}
          DEPLOY_HEALTH_CMD: ${{ vars.DEPLOY_HEALTH_CMD }}
          DEPLOY_HEALTH_WAIT: ${{ vars.DEPLOY_HEALTH_WAIT }}
          TARGET_SHA: ${{ needs.preflight.outputs.sha }}
        run: |
          # 脚本经 stdin 送入服务器执行：执行的 deploy.sh 永远与所部署
          # SHA 同一版本，不依赖服务器上已有的旧脚本。
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o BatchMode=yes \
              -o ConnectTimeout=15 \
              -p "${DEPLOY_PORT:-22}" \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              env TARGET_SHA="$TARGET_SHA" \
                  APP_DIR="$DEPLOY_APP_DIR" \
                  SERVICES="$DEPLOY_SERVICES" \
                  VENV="$DEPLOY_VENV" \
                  HEALTH_CMD="$DEPLOY_HEALTH_CMD" \
                  HEALTH_WAIT="$DEPLOY_HEALTH_WAIT" \
                  bash -s < deploy/deploy.sh
