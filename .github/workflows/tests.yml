name: tests

on:
  push:
  pull_request:

# Runtime deliberately refuses to start outside UTC+8 because scheduling,
# T+1 and daily state all share the host's local clock.  CI must exercise the
# same explicit deployment contract instead of inheriting ubuntu-latest's UTC.
env:
  TZ: Asia/Shanghai

jobs:
  stdlib-tests:
    # 纯标准库测试：不装任何第三方依赖，验证核心逻辑在最小环境可跑
    name: stdlib tests (no deps)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run stdlib-only test suite
        working-directory: trading
        run: python3 -m unittest discover -s . -p "test_*.py" -v

  dependency-tests:
    # 依赖版测试：装 flask/pandas/ccxt 后跑交易逻辑/路由集成用例
    name: dependency tests (flask/pandas/ccxt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          # 与生产服务器及 requirements.lock 的解析环境保持一致。
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        working-directory: trading
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
      - name: Run dependency-based test suite
        working-directory: trading
        run: python3 -m unittest discover -s tests -p "test_*.py" -v

  frontend-syntax:
    # 前端 JS 语法检查：node --check 解析（不执行，无需浏览器/DOM）我们自己的 app.js，
    # 守住「推个语法坏掉的前端」。lwc.js 是 vendored 的第三方库（TradingView），不检。
    name: frontend syntax (app.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Check app.js syntax
        run: node --check trading/static/app.js
