name: tests

on:
  push:
  pull_request:

jobs:
  stdlib-tests:
    # 纯标准库测试：不装任何第三方依赖，验证核心逻辑在最小环境可跑
    name: stdlib tests (no deps)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run stdlib-only test suite
        working-directory: trading
        run: python3 -m unittest discover -s . -p "test_*.py" -v

  dependency-tests:
    # 依赖版测试：装 flask/pandas/ccxt 后跑交易逻辑/路由集成用例
    name: dependency tests (flask/pandas/ccxt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        working-directory: trading
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run dependency-based test suite
        working-directory: trading
        run: python3 -m unittest tests.test_trading_logic_unittest -v
